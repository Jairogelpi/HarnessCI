# LiteLLM gateway config for the Pi/Gentle AI harness.
#
# Usage:
#   set KILO_API_KEY=...
#   set LITELLM_MASTER_KEY=...
#   set LANGFUSE_PUBLIC_KEY=...
#   set LANGFUSE_SECRET_KEY=...
#   litellm --config configs/litellm/harnessci.yaml --port 4000
#
# Then point Pi models.json to http://localhost:4000/v1 using model IDs
# `harness-frontier` and `harness-cheap`.

model_list:
  - model_name: harness-frontier
    litellm_params:
      model: openai/kilo-auto/frontier
      api_base: https://api.kilo.ai/api/gateway
      api_key: os.environ/KILO_API_KEY
    model_info:
      mode: chat
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  - model_name: harness-cheap
    litellm_params:
      model: openai/kilo-auto/free
      api_base: https://api.kilo.ai/api/gateway
      api_key: os.environ/KILO_API_KEY
    model_info:
      mode: chat
      input_cost_per_token: 0
      output_cost_per_token: 0

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 120

litellm_settings:
  drop_params: true
  telemetry: false
  # Langfuse records traces/cost/latency for harness observability.
  # Keep message logging off by default to avoid leaking private code/secrets.
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  turn_off_message_logging: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
