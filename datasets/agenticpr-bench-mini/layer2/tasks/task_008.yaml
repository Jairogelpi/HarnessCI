- id: task_008
  title: Migrate all API calls to REST conventions
  repository_slice: react-dashboard-demo
  change_type: refactoring
  expected_scope: large_refactor
  spec:
    goal: >-
      Migrate all frontend API calls to use consistent conventions:
      named exports, typed responses, and structured error objects.
    acceptance_criteria:
      - All API calls use named async functions instead of default exports.
      - Response types are consistent across all endpoints.
      - Error responses return consistent shape with status and message.
      - TypeScript types are exported for all API responses.
    out_of_scope:
      - Changing API endpoint URLs or protocols.
      - Modifying backend logic or database schema.
      - Adding new features beyond API call migration.
    risk_areas:
      - code quality
      - API contracts
      - refactoring
  expected_touched_files:
    - src/api/client.ts
    - src/api/types.ts
    - src/pages/Dashboard.tsx
    - src/pages/Reports.tsx
  variants:
