- change_type: refactor
  expected_scope: large_change
  expected_touched_files:
  - app/
  - tests/
  - requirements.txt
  id: task_0003
  repository_slice: fastapi-auth-demo
  spec:
    acceptance_criteria:
    - Implementation follows snake_case conventions
    - Existing tests continue to pass
    - No regression in performance
    goal: 'In repository fastapi-auth-demo: extract validation logic into utility'
    out_of_scope: &id001
    - app/auth/middleware.py
    - app/core/secrets.py
    risk_areas:
    - refactor
  template:
    conventions:
      api: REST
      auth: JWT in Authorization header
      naming: snake_case
    entities:
    - files:
      - app/models/user.py
      invariants:
      - password is hashed
      name: User
    - files:
      - app/auth/middleware.py
      - app/auth/session.py
      invariants:
      - session expires after 30min
      name: Session
    forbidden_paths: *id001
    languages:
    - python
    test_patterns:
    - tests/
    - '*_test.py'
  template_domain: FastAPI authentication microservice
  title: '[fastapi-auth-demo] Extract validation logic into utility'
  variants:
    acceptable:
      gold:
        architecture_drift: false
