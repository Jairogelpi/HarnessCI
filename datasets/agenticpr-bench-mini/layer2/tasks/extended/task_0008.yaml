- change_type: refactor
  expected_scope: large_change
  expected_touched_files:
  - billing/
  - templates/
  - tests/
  id: task_0008
  repository_slice: django-billing-demo
  spec:
    acceptance_criteria:
    - Implementation follows snake_case conventions
    - Existing tests continue to pass
    - No regression in performance
    goal: 'In repository django-billing-demo: extract validation logic into utility'
    out_of_scope: &id001
    - billing/webhooks.py
    - billing/payments.py
    risk_areas:
    - refactor
  template:
    conventions:
      api: REST
      auth: Django session + CSRF
      naming: snake_case
    entities:
    - files:
      - billing/models.py
      - billing/views.py
      invariants:
      - total = sum(items)
      - status in [draft, sent, paid]
      name: Invoice
    - files:
      - billing/webhooks.py
      - billing/payments.py
      invariants:
      - amount > 0
      - currency = USD
      name: Payment
    forbidden_paths: *id001
    languages:
    - python
    test_patterns:
    - tests/
    - '*_test.py'
    - test_*.py
  template_domain: Django billing and invoicing system
  title: '[django-billing-demo] Extract validation logic into utility'
  variants:
    acceptable:
      gold:
        architecture_drift: false
        missing_tests: false
        overengineering: false
        security_sensitive: false
        spec_violation: false
        unrelated_changes: false
      patch: patches/task_0008_acceptable.diff
      primary_label: ACCEPTABLE
    needs_review:
      gold:
        architecture_drift: true
        missing_tests: true
        overengineering: true
        security_sensitive: false
        spec_violation: true
        unrelated_changes: true
      patch: patches/task_0008_needs_review.diff
      primary_label: NEEDS_REVIEW
    unacceptable:
      gold:
        architecture_drift: true
        missing_tests: true
        overengineering: true
        security_sensitive: false
        spec_violation: true
        unrelated_changes: true
      patch: patches/task_0008_unacceptable.diff
      primary_label: UNACCEPTABLE
