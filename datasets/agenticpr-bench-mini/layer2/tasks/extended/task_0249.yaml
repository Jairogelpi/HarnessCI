  repository_slice: sql-migrations
  spec:
    acceptance_criteria:
    - Implementation follows snake_case conventions
    - Existing tests continue to pass
    - No regression in performance
    goal: 'In repository sql-migrations: add new column with migration'
    out_of_scope: &id001
    - migrations/
