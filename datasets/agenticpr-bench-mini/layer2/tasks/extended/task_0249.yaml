      - src/migrate.py
      - migrations/
      invariants:
      - up and down reversible
      - idempotent
      name: Migration
    - files:
      - src/schema.py
      - src/validate.py
      invariants:
      - no data loss on up
      - foreign keys valid
      name: Schema
    forbidden_paths: *id001
    languages:
    - python
    test_patterns:
    - tests/
    - '*_test.py'
  template_domain: SQL migration management tool
  title: '[sql-migrations] Add new column with migration'
