- change_type: feature
  expected_scope: medium_change
  expected_touched_files:
  - app/
  - tests/
  - requirements.txt
  id: task_0032
  repository_slice: flask-api
  spec:
    acceptance_criteria:
    - Implementation follows snake_case conventions
    - Existing tests continue to pass
    - No regression in performance
    goal: 'In repository flask-api: add pagination to list endpoint'
    out_of_scope: &id001
    - app/routes/auth.py
    - app/config.py
    risk_areas:
    - feature
  template:
    conventions:
      api: REST
      auth: Flask-Login + session
      naming: snake_case
    entities:
    - files:
      - app/models/task.py
      - app/routes/tasks.py
      invariants:
      - has owner
      - status in [todo, doing, done]
      name: Task
    - files:
      - app/models/user.py
      - app/routes/auth.py
      invariants:
      - email is unique
      - password is hashed
      name: User
    forbidden_paths: *id001
    languages:
    - python
    test_patterns:
    - tests/
    - '*_test.py'
  template_domain: Flask REST API for task management
  title: '[flask-api] Add pagination to list endpoint'
  variants:
    acceptable:
      gold:
        architecture_drift: false
        missing_tests: false
        overengineering: false
        security_sensitive: false
        spec_violation: false
        unrelated_changes: false
      patch: patches/task_0032_acceptable.diff
