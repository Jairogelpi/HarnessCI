  template:
    conventions:
      api: REST
      auth: OAuth2 + JWT
      naming: camelCase
    entities:
    - files:
      - src/main/java/com/app/order/
      invariants:
      - has customerId
      - total > 0
      name: Order
    - files:
      - src/main/java/com/app/inventory/
      invariants:
      - quantity >= 0
      - reserved <= available
      name: Inventory
    forbidden_paths: *id001
    languages:
    - java
    test_patterns:
    - src/test/
    - '*Test.java'
    - '*Tests.java'
