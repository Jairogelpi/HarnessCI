- id: task_002
  title: Pin billing webhook dependency safely
  repository_slice: django-billing-demo
  change_type: dependency-update
  expected_scope: medium_change
  spec:
    goal: >-
      Pin the billing webhook client dependency to a safe compatible version
      without weakening signature verification.
    acceptance_criteria:
      - Dependency version is pinned to a non-vulnerable compatible range.
      - Webhook signature verification remains required.
      - Existing webhook tests continue to cover invalid signatures.
      - Configuration changes are documented for operators.
    out_of_scope:
      - Replacing the payment provider.
      - Disabling webhook signature checks.
      - Changing invoice creation semantics.
    risk_areas:
      - billing
      - dependency management
      - webhook security
  expected_touched_files:
    - requirements.txt
    - billing/webhooks.py
    - tests/test_webhooks.py
    - docs/billing.md
  variants:
    acceptable:
      patch: patches/task_002_acceptable.diff
