- id: task_003
  title: Extract HTTP response parsing into a utility function
  repository_slice: fastapi-auth-demo
  change_type: refactoring
  expected_scope: small_refactor
  spec:
    goal: >-
      Extract the JSON response parsing logic from route handlers into a
      reusable utility function to reduce duplication across controllers.
    acceptance_criteria:
      - A parse_response utility is created in app/utils/response.py.
      - All route handlers that parse JSON responses use the new utility.
      - Existing route behavior is unchanged (same status codes and response shapes).
      - The utility handles non-200 responses gracefully.
    out_of_scope:
      - Changing response format or status codes.
      - Adding new API endpoints.
      - Modifying authentication logic.
    risk_areas:
      - code quality
      - refactoring
      - API contracts
  expected_touched_files:
    - app/utils/response.py
    - app/auth/routes.py
    - app/billing/routes.py
    - tests/test_utils.py
